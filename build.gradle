plugins {
    id 'eclipse'
    id 'net.neoforged.moddev' version '2.0.95'
}

version = '1.0'
base.archivesName = "modid"

java.toolchain.languageVersion = JavaLanguageVersion.of(21)

neoForge {
    version = "21.1.190"

    runs {
        client {
            client()

            def mcreatorJvmOptions = System.getenv('MCREATOR_JVM_OPTIONS')
            if (mcreatorJvmOptions) {
                mcreatorJvmOptions.split("\\s+").findAll { it.trim() }.each { arg ->
                    jvmArgument(arg)
                }
            }
        }
        server {
            server()
        }

        configureEach {
            systemProperty 'forge.logging.markers', 'REGISTRIES'
            logLevel = org.slf4j.event.Level.DEBUG
        }
    }

    mods {
        mcreator {
            sourceSet sourceSets.main
        }
    }
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8' // Use the UTF-8 charset for Java compilation
}

def optiminiumMixinJson = '''{
  "required": true,
  "minVersion": "0.8",
  "package": "net.optiminium.mixin",
  "mixins": [
    "ChunkMapMixin"
  ],
  "client": [
    "EntityRenderDispatcherMixin",
    "ParticleEngineMixin"
  ],
  "injectors": {
    "defaultRequire": 1
  }
}
'''

tasks.register('writeOptiminiumMixinResources') {
    dependsOn tasks.named('processResources')
    def resourcesDir = layout.buildDirectory.dir('resources/main')
    outputs.file(resourcesDir.map { it.file('optiminium.mixins.json') })
    outputs.upToDateWhen { false }
    doLast {
        def outputDir = resourcesDir.get().asFile
        outputDir.mkdirs()
        new File(outputDir, 'optiminium.mixins.json').text = optiminiumMixinJson

        def modsToml = new File(outputDir, 'META-INF/neoforge.mods.toml')
        if (modsToml.isFile()) {
            def text = modsToml.text
            if (!text.contains('config="optiminium.mixins.json"')) {
                modsToml.text = text.replace(
                    '# Start of user code block mod configuration',
                    '# Start of user code block mod configuration\n[[mixins]]\nconfig="optiminium.mixins.json"'
                )
            }
        }
    }
}

tasks.named('classes') {
    dependsOn tasks.named('writeOptiminiumMixinResources')
}

apply from: 'mcreator.gradle'
